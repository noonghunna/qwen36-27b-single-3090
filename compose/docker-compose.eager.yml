# ===========================================================================
# Eager — spec-decode + 125K ctx + tools, no Genesis patches needed.
#
# This variant is the "no-patch-tree" path: same TurboQuant + MTP + vision +
# tool-call coverage as the v7.14 default, but bypasses every cudagraph-related
# bug class by disabling cudagraph entirely (`--enforce-eager`).
#
# Trade-off vs `docker-compose.v714.yml` (the patched path):
#   - This: ~52-65 TPS at 125K ctx, no Genesis tree to maintain, simpler stack
#   - v7.14: ~85 TPS at 32K ctx with Genesis P65 PIECEWISE (faster but patch-heavy)
#
# Why it works without any patches:
#   - vllm#40880's tool-call cascade only manifests during cudagraph capture of
#     the K+1 spec-verify path. With `--enforce-eager`, vLLM never captures any
#     cudagraph at all, so the bug can't fire.
#   - You give up cudagraph speedup (~20% per token typically) but keep MTP's
#     ~3× spec-decode acceptance rate, so net throughput stays well above the
#     no-spec-decode minimal compose.
#
# Credit: this variant was suggested by @ampersandru in single-3090 issue #1
# after they hit the tool-call cascade on the unpatched default compose.
#
# Run:
#   cd compose && docker compose -f docker-compose.eager.yml up -d
# ===========================================================================
services:
  vllm-qwen36-27b-eager:
    image: vllm/vllm-openai:nightly
    container_name: vllm-qwen36-27b-eager
    restart: "no"
    ports:
      - "8020:8000"
    volumes:
      - ${MODEL_DIR:-../models}:/root/.cache/huggingface
    environment:
      # Uncomment the next line to pin to a specific GPU (e.g. GPU 0):
      # - CUDA_VISIBLE_DEVICES=0
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      - --dtype
      - float16
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "131072"
      - --gpu-memory-utilization
      - "0.92"
      - --max-num-seqs
      - "1"
      - --max-num-batched-tokens
      - "4128"
      - --kv-cache-dtype
      - turboquant_3bit_nc
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --no-scheduler-reserve-full-isl
      - --enforce-eager
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":3}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
