# ===========================================================================
# Long-context functional variant — TurboQuant 3-bit KV at 125K with the
# cudagraph workaround for vllm-project/vllm#40831.
#
# Naive TurboQuant + MTP @ 125K (fully compiled with cudagraph) produces
# correct attention math on Triton kernels but the *captured CUDA graph* of
# that math corrupts spec-decode output:
#
#   1. Tool-call prompts:        <tool_call><tool_call><tool_call>...
#   2. Streaming (occasionally): "Wait, I I I I I I I..."
#   3. Long-context recall:      "amber amber amber amber..."
#
# Six-probe isolation ladder (full data in #40831):
#
#   probe  turboquant  spec-dec  cudagraph  torch.compile  result   TPS
#     1       ✅         ❌        ✅          ✅          ✅       40
#     2       ✅       ngram      ✅          ✅          ✗ loops  --
#     3 mimo  ✅       MTP n=1    ✅          ✅          ✗ collapse
#     4       ✅       MTP        ✅       threshold=0     ✗        --
#     5       ✅       MTP        ❌          ❌          ✅       23
#     6       ✅       MTP        ❌          ✅          ✅       33  ← this file
#
# Probe 6 isolates the bug to vLLM's CUDA graph capture/replay machinery,
# specifically for spec-decode + TurboQuant. Triton kernels and torch.compile
# inductor output are correct when invoked dynamically; only the captured
# graph corrupts the output. Filed upstream at vllm-project/vllm#40831.
#
# This compose adds `--compilation-config '{"cudagraph_mode":"NONE"}'`, which
# disables CUDA graph capture but keeps torch.compile on. The result:
#
#   • All 7 verify-full.sh tests pass (tools, streaming, thinking, recall)
#   • TPS drops to ~33 (vs. ~85 with broken-but-fast cudagraph on)
#   • Context: 125K (KV pool), vision enabled
#   • No model patches needed beyond what's in patches/
#
# Variant matrix:
#
#   docker-compose.yml             (default)   20K   66/84 TPS  vision  ✅
#   docker-compose.tools-text.yml              75K   65/84 TPS  no vis  ✅
#   docker-compose.longctx-experimental.yml   125K     33 TPS   vision  ✅ (this)
#
# Drop the cudagraph workaround once upstream fixes #40831; expected TPS
# recovery from ~33 to ~85+ at that point.
#
# Run with:
#   cd compose && docker compose -f docker-compose.longctx-experimental.yml up -d
# ===========================================================================
#
# Before running: `bash ../scripts/setup.sh` to fetch Genesis patches and
# download + SHA-verify the Lorbus model.
#
# Model dir override: set MODEL_DIR env var.
services:
  vllm-qwen36-27b:
    # Pinned to the exact nightly we tested and the Genesis patches verified against.
    # Unpinning (just `vllm/vllm-openai:nightly`) may work but isn't guaranteed —
    # if a newer nightly changes qwen3_reasoning_parser.py formatting, Genesis
    # Patch 12 (Qwen3 tool_call fix) logs [FAILED] and tool calling silently
    # breaks (model emits <tool_call>...</tool_call> as plain text instead of
    # populating tool_calls[] in the API response).
    image: vllm/vllm-openai@sha256:9bba4628a3b943e0dd33caefb94b811569ba1e97bdf23bee19a265c31b947ccb
    container_name: vllm-qwen36-27b
    restart: "no"
    ports:
      - "8020:8000"
    volumes:
      - ${MODEL_DIR:-../models}:/root/.cache/huggingface
      - ../patches/genesis/patch_genesis_unified.py:/patches/patch_genesis_unified.py:ro
      - ../patches/patch_tolist_cudagraph.py:/patches/patch_tolist_cudagraph.py:ro
    environment:
      # Uncomment the next line to pin to a specific GPU (e.g. GPU 0):
      # - CUDA_VISIBLE_DEVICES=0
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=1
      - VLLM_NO_USAGE_STATS=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
      - VLLM_FLOAT32_MATMUL_PRECISION=high
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      - CUDA_DEVICE_MAX_CONNECTIONS=8
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_MARLIN_USE_ATOMIC_ADD=1
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        pip install xxhash -q
        python3 /patches/patch_genesis_unified.py
        python3 /patches/patch_tolist_cudagraph.py
        exec vllm serve "$@"
      - --
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      - --dtype
      - float16
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "125000"
      - --gpu-memory-utilization
      - "0.97"
      - --max-num-seqs
      - "1"
      - --max-num-batched-tokens
      - "4128"
      - --kv-cache-dtype
      - turboquant_3bit_nc
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --no-scheduler-reserve-full-isl
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":3}'
      # Workaround for vllm-project/vllm#40831 — cudagraph capture corrupts
      # spec-decode output for the TurboQuant attention backend. Disabling
      # cudagraph (keeping torch.compile on) restores correctness at the cost
      # of ~60% TPS. Drop this flag once upstream fixes the issue.
      - --compilation-config
      - '{"cudagraph_mode":"NONE"}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
