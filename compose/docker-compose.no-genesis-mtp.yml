# ===========================================================================
# DIAGNOSTIC ONLY — no Genesis, fp8 + MTP n=3.
#
# Purpose: control experiment to isolate whether Genesis v7.14+ patches
# regress TPS vs stock vLLM nightly. Identical to docker-compose.yml except
# Genesis volume mount, apply_all, and the Genesis env vars are removed.
#
# Same image, same model, same MTP n=3, same fp8_e5m2 KV, same 20K ctx.
# Only difference: no Genesis tree.
#
# If TPS matches docker-compose.yml → Genesis is performance-neutral on this path.
# If TPS exceeds docker-compose.yml → Genesis is silently regressing TPS.
# If TPS lower             → Genesis is providing speedup (and reverse).
#
# Reddit reference: u/sudeposutemizligi reported 55 narr / 68 code on
# 2× 3090 PCIe + dev45 nightly + fp8 + MTP n=3 + no Genesis at TP=2 / 131K.
# This compose is the TP=1 / 20K analog for our matrix.
#
# Run:
#   cd compose && docker compose -f docker-compose.no-genesis-mtp.yml up -d
# ===========================================================================
services:
  vllm-qwen36-27b:
    image: vllm/vllm-openai:nightly-07351e0883470724dd5a7e9730ed10e01fc99d08
    container_name: vllm-qwen36-27b
    restart: "no"
    ports:
      - "8020:8000"
    volumes:
      - ${MODEL_DIR:-../models}:/root/.cache/huggingface
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_NO_USAGE_STATS=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_MARLIN_USE_ATOMIC_ADD=1
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      - --dtype
      - float16
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "20000"
      - --gpu-memory-utilization
      - "0.95"
      - --max-num-seqs
      - "1"
      - --max-num-batched-tokens
      - "2048"
      - --kv-cache-dtype
      - fp8_e5m2
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":3}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
