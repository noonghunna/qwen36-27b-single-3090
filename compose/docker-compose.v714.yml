# ===========================================================================
# Single-card Qwen3.6-27B + Genesis v7.14 + TurboQuant_3bit_nc + MTP n=3.
#
# This is the surgical fix for the silent tool-call cascade bug
# (vllm-project/vllm#40880) that the older `docker-compose.yml` and
# `docker-compose.longctx-experimental.yml` paths exhibit.
#
# What v7.14 changes vs old Genesis:
#   - P65 forces cudagraph_mode=PIECEWISE for spec-decode (MTP runs eager
#     continuation → correct math, tool calls populate tool_calls[] cleanly)
#   - P66 filters cudagraph capture sizes for spec-decode divisibility
#   - P64 fixes streaming MTP tool-call edge case
#   - P68/P69 long-ctx tool-format adherence (env-opt-in)
#
# Trade-off vs the old fast path:
#   - Tool calls now WORK (was silently broken — `<tool_call>` cascade)
#   - 51 narrative / 68 code TPS sustained across 32K → 65K → 90K → 125K → 192K
#
# Two prefill-activation cliffs make 24 GB-card defaults non-trivial (verified 2026-04-28):
#
# CLIFF 1 — TurboQuant attention scratch + tool-response prefill
#   Trigger: ≥25K total prompt with TQ3 KV at high mem_util.
#   Site:    turboquant_attn forward, dequant scratch + mid_o/output buffers.
#   Symptom: CUDA OOM allocating ~138 MiB; engine dies mid-request.
#   Why:    fits the bug ampersandru reported in #1 (Hermes news-fetch, 20K+
#           token tool response stuffed back into the conversation).
#
# CLIFF 2 — DeltaNet/GLA recurrent state buffer
#   Trigger: single prompt above ~50-60K tokens (regardless of tool use).
#   Site:    fla.ops.chunk.chunk_gated_delta_rule_fwd_h.h.new_empty(B, NT, H, V, K)
#           where NT = ceil(seq_len / chunk_size) — grows with prompt length.
#   Symptom: CUDA OOM allocating ~50-740 MiB during forward; engine dies.
#   Why:    Qwen3-Next is hybrid (16 attention + 48 GDN layers). GDN state
#           is sized by total seq_len, not chunk size — chunked-prefill
#           doesn't help. We can't fix this short of multi-GPU or upstream
#           kernel changes.
#
# vLLM's `--gpu-memory-utilization` is a hard cap with no soft fallback or
# circular eviction. Everything outside the cap — prefill activation peaks,
# fragmentation, kernel scratch — has to fit in `(1 - mem_util) × 24 GB`.
# vLLM's pre-check guarantees the steady-state KV fits, not the activation
# peak during forward.
#
# Measured envelope on dev205 + Genesis v7.54 (1× 3090 24 GB, vision on, TQ3 KV):
#
#   max-model-len   mem-util    boots?   safe single-prompt    notes
#   ────────────────────────────────────────────────────────────────────────────
#    48,000          0.92       ✅       up to 48K               ⭐ default — verify-full.sh ALL 10 PASS
#    64,000          0.92       ✅       up to ~50K               needle scale=900 (~58K) OOMs
#    96,000          0.93       ✅       up to ~50K               needle scale=900 OOMs
#   128,000          0.95       ✅       up to ~40K (tool only)   #7 needle 60K+ OOMs, #8 ≤40K passes
#   192,000          0.98       ✅       up to ~16K               #8 OOMs on 25K+ tool prefill (ampersandru)
#   205,000          0.98 + no vision    up to ~16K               same as 192K + drops vision
#
# This variant ships **48K + 0.92** as the production default — verify-full.sh
# passes all 10 checks (including the long-context needle at 10K + 30K depths,
# tool-prefill OOM at 25K+, and MTP acceptance ≥2.0). 48K covers chat history
# accumulation, single-file coding, tool-using agent flows up to ~30K tool
# responses, and document analysis up to ~40K input.
#
# Above-cliff requests get a CLEAN HTTP 400 from the engine pre-check (not an
# OOM crash). To push higher and accept the risk, see the opt-in matrix above
# and the README "Activation memory caveat" section.
#
# This variant is the recommended path for ALL contexts up to 192K. It
# obsoletes the older `docker-compose.longctx-experimental.yml` (38/50 TPS at
# 125K via cudagraph_mode=NONE) which is now strictly slower at lower ctx.
#
# Variant matrix (re-bench 2026-04-27 on dev205 + Genesis v7.54):
#
#   docker-compose.yml             (default)        20K   55/70 TPS  vision    ✓
#   docker-compose.tools-text.yml                   75K   53/70 TPS  no vis    ✓
#   docker-compose.no-genesis-mtp.yml               20K   55/68 TPS  vision    ✓ (control — no patches)
#   docker-compose.minimal.yml                      32K   32/33 TPS  vision    ✓ (no spec-decode)
#   docker-compose.longctx-experimental.yml        125K   38/50 TPS  vision    ✓ (DEPRECATED — superseded by v714)
#   docker-compose.v714.yml                        48K   51/68 TPS  vision    ✓ (THIS — Genesis v7.14 P65 + TQ3 KV; opt-in 64K-205K with caveats)
#
# Upstream tracker: vllm-project/vllm#40880 (Sandermage's root-cause + v7.14
# patches). Proper kernel fix (P67) designed-but-not-implemented; v7.14 is
# a workaround until that lands.
#
# Run with:
#   bash ../scripts/setup.sh    # ensures Genesis tree at v7.14+ layout
#   cd compose && docker compose -f docker-compose.v714.yml up -d
# ===========================================================================
services:
  vllm-qwen36-27b:
    image: vllm/vllm-openai:nightly-07351e0883470724dd5a7e9730ed10e01fc99d08
    container_name: vllm-qwen36-27b
    restart: "no"
    ports:
      - "8020:8000"
    volumes:
      - ${MODEL_DIR:-../models}:/root/.cache/huggingface
      # Genesis v7.14 modular package (mounted into vLLM's site-packages).
      # Apply via `python3 -m vllm._genesis.patches.apply_all` at boot.
      - ../patches/genesis/vllm/_genesis:/usr/local/lib/python3.12/dist-packages/vllm/_genesis:ro
      # Standalone .tolist() cudagraph capture fix — separate bug from P65.
      # Different bug class: P65 fixes cu_seqlens_k=cu_seqlens_q misclassification;
      # this fix guards .tolist() syscalls during capture.
      - ../patches/patch_tolist_cudagraph.py:/patches/patch_tolist_cudagraph.py:ro
    environment:
      # Uncomment the next line to pin to a specific GPU (e.g. GPU 0):
      # - CUDA_VISIBLE_DEVICES=0
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - NCCL_CUMEM_ENABLE=0
      - NCCL_P2P_DISABLE=1
      - VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=1
      - VLLM_NO_USAGE_STATS=1
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
      - VLLM_FLOAT32_MATMUL_PRECISION=high
      - VLLM_USE_FLASHINFER_SAMPLER=1
      - OMP_NUM_THREADS=1
      - CUDA_DEVICE_MAX_CONNECTIONS=8
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - VLLM_MARLIN_USE_ATOMIC_ADD=1
      # Genesis v7.14 opt-in patches — these are OFF by default and must be
      # enabled per-process. Without these, v7.14 produces the same cudagraph
      # behavior as v7.13 (silent tool-call cascade).
      - GENESIS_ENABLE_P65_TURBOQUANT_SPEC_CG_DOWNGRADE=1   # core fix for #40880
      - GENESIS_ENABLE_P66_CUDAGRAPH_SIZE_FILTER=1           # capture-size divisibility
      - GENESIS_ENABLE_P64_QWEN3CODER_MTP_STREAMING=1        # streaming tool-call edge case
      - GENESIS_ENABLE_P68_AUTO_FORCE_TOOL=1                 # long-ctx tool adherence
      - GENESIS_ENABLE_P69_LONG_CTX_TOOL_REMINDER=1
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint:
      - /bin/bash
      - -c
      - |
        set -e
        pip install xxhash pandas scipy -q
        python3 -m vllm._genesis.patches.apply_all
        python3 /patches/patch_tolist_cudagraph.py
        exec vllm serve "$@"
      - --
    command:
      - --model
      - /root/.cache/huggingface/qwen3.6-27b-autoround-int4
      - --served-model-name
      - qwen3.6-27b-autoround
      - --quantization
      - auto_round
      - --dtype
      - float16
      - --tensor-parallel-size
      - "1"
      # 48K + 0.92 — production default. Below BOTH cliffs:
      #   - GDN forward (single-prompt OOM at ~50-60K tokens) → 48K stays safely under
      #   - TurboQuant tool prefill (OOM at high mem_util + big tool responses) → 0.92 leaves ~1.9 GB headroom
      # Engine REJECTS oversized requests with HTTP 400 (clean), no crashes.
      # Verify-full.sh ALL 10 checks pass at this combo (2026-04-28).
      #
      # To push higher (with caveats — read the comment block at the top of
      # this file + the README Activation memory caveat first):
      #   - 64K + 0.92  → up to ~50K single prompts safe (most agent flows)
      #   - 96K + 0.93  → up to ~40-50K; #7 needle scale=900 OOMs in GDN
      #   - 128K + 0.95 → up to ~40K tool prefill, single prompts >50K may OOM
      #   - 192K + 0.98 → up to ~16K prefills only — ampersandru-class workload
      #   - 205K + 0.98 + --language-model-only (uncomment below) → text-only frontier
      - --max-model-len
      - "48000"
      - --gpu-memory-utilization
      - "0.92"
      - --max-num-seqs
      - "1"
      - --max-num-batched-tokens
      - "4128"
      - --kv-cache-dtype
      - turboquant_3bit_nc
      # For maximum context (205K instead of 192K), uncomment the next line
      # to drop the vision tower. Frees ~1 GB VRAM, lifts engine ceiling
      # from 192K to ~206K. Trade-off: text-only.
      #- --language-model-only
      - --trust-remote-code
      - --reasoning-parser
      - qwen3
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --enable-prefix-caching
      - --enable-chunked-prefill
      - --no-scheduler-reserve-full-isl
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":3}'
      # cudagraph_mode left at vLLM default. Genesis v7.14 P65 auto-downgrades
      # FULL_AND_PIECEWISE → PIECEWISE for spec-decode K+1 verify; 1-token
      # decode batches still get cudagraph capture. Forcing FULL_AND_PIECEWISE
      # explicitly produces no measurable benefit (verified 2026-04-27).
      - --host
      - 0.0.0.0
      - --port
      - "8000"
